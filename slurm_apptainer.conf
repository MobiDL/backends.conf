
# This is an example of how you can use Cromwell to interact with SLURM
# workload manager. *This is not a complete configuration file!* The
# content here should be copy pasted into the backend -> providers section
# of the cromwell.examples.conf in the root of the repository. You should
# uncomment lines that you want to define, and read carefully to customize
# the file. If you have any questions, please open an issue at
# https://www.github.com/broadinstitute/cromwell/issues

docker {
  hash-lookup {
    // /!\ Attention /!\
    // If you disable this call caching will be disabled for jobs with floating docker tags !
    enabled = false
  }
}


workflow-options {
  # Directory where to write per workflow logs
  workflow-log-dir: "/scratch/cromwell/workflow-logs"

  # When true, per workflow logs will be deleted after copying
  workflow-log-temporary: false

  # Workflow-failure-mode determines what happens to other calls when a call fails. Can be either ContinueWhilePossible or NoNewCalls.
  # Can also be overridden in workflow options. Defaults to NoNewCalls. Uncomment to change:
  #workflow-failure-mode: "ContinueWhilePossible"
}

backend {
  default = slurm

  providers {
    slurm {
      actor-factory = "cromwell.backend.impl.sfs.config.ConfigBackendLifecycleActorFactory"                                                                                     
      config {
        runtime-attributes = """
        Int runtime_minutes = 600
        String bind_opt = ""
        Int cpu = 1
        Int requested_memory_mb_per_core = 768
        String queue = "prod"
        String? docker
        String tmp_dir = "/scratch/cromwell/tmp/"
        String root_dir = "/scratch/cromwell/"
        """

        # https://bioinformatics.stackexchange.com/questions/15506/how-do-i-keep-a-glob-from-copying-a-file-in-cromwell-wdl
        glob-link-command = "find GLOB_PATTERN 2> /dev/null | xargs -I ? ln -s ? GLOB_DIRECTORY"

        temporary-directory = "$(mktemp -d /scratch/cromwell/tmp/tmp.XXXXXX)"
        root = "/scratch/cromwell/executions/"

        submit = """
            sbatch \
              --wait \
              -J ${job_name} \
              -D ${cwd} \
              -o ${out} \
              -e ${err} \
              -t ${runtime_minutes} \
              --partition ${queue} \
              ${"-c " + cpu} \
              --mem-per-cpu=${requested_memory_mb_per_core} \
              --wrap "/usr/bin/env bash ${script}"
        """

        submit-docker = """
            # Make sure the APPTAINER_CACHEDIR variable is set.
            TMPDIR=/scratch/tmp
            APPTAINER_TMPDIR=/scratch/tmp
            APPTAINER_CACHEDIR=/scratch/tmp

            APPTAINER_IMAGES=/bioinfo/apptainer_sif/

            APPTAINER_IMAGE_FILE=$(echo "${docker}" | sed 's#.*/##; s/:/_/g; s/$/.sif/;')
            if [ -f "$APPTAINER_IMAGES/$APPTAINER_IMAGE_FILE" ]; then
                echo "Using cached image file $APPTAINER_IMAGE_FILE"
                APPTAINER_CONTAINER_ARG="$APPTAINER_IMAGES/$APPTAINER_IMAGE_FILE"
            else
                >&2 echo "This image does not exist (private/locale repo) : $APPTAINER_IMAGES/$APPTAINER_IMAGE_FILE"
            fi

            BIND_OPTS=""
            IFS=,
            List="${bind_opt}"
            for bind in $List; 
            do
                if [ $bind ];
                then
                    BIND_OPTS="$BIND_OPTS --bind \"$(realpath $bind):$(realpath $bind)\""
                fi
            done

            echo "apptainer exec --containall --bind ${root_dir}:${root_dir} --bind ${tmp_dir}:${tmp_dir} --bind ${cwd}:${docker_cwd} $BIND_OPTS $APPTAINER_CONTAINER_ARG ${job_shell} ${docker_script}"


            # Submit the script to SLURM
            sbatch \
              --wait \
              -J ${job_name} \
              -D ${cwd} \
              -o ${cwd}/execution/stdout \
              -e ${cwd}/execution/stderr \
              -t ${runtime_minutes} \
              --partition ${queue} \
              ${"-c " + cpu} \
              --mem-per-cpu=${requested_memory_mb_per_core} \
              --wrap "apptainer exec --containall --bind ${root_dir}:${root_dir} --bind ${tmp_dir}:${tmp_dir} --bind ${cwd}:${docker_cwd} $BIND_OPTS $APPTAINER_CONTAINER_ARG ${job_shell} ${docker_script}"

        """

        filesystems {
          local {
            caching.duplication-strategy = ["copy"]
            localization = ["soft-link", "copy"]
            docker.allow-soft-links: true
          }
        }

        kill = "scancel ${job_id}"
        check-alive = "squeue -j ${job_id}"
        job-id-regex = "Submitted batch job (\\d+).*"
      }
    }
  }
}
